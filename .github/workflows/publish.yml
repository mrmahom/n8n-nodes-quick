name: Publish to npm

# Provenance-elt publish minden `vX.Y.Z` tag push-ra. A `--provenance` flag és
# az `id-token: write` permission együtt OIDC-szel kriptográfiailag bizonyítja
# az npm-nek, hogy a tarball a public GitHub repo-ból, ezzel a workflow-val
# készült. Ez az n8n "verified community node" feltétele:
# https://docs.n8n.io/integrations/creating-nodes/deploy/submit-community-nodes/

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify version matches tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json verzió ($PKG_VERSION) nem egyezik a taggel ($TAG_VERSION)"
            exit 1
          fi
          echo "Verzió egyezik: $PKG_VERSION"

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test (with coverage threshold)
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: n8n community-node scan (cloud sandbox compatibility)
        run: npm run scan

      - name: Publish to npm with provenance
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
